<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EmoSense – AI Emotion Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #22222f;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --accent: #7c6aff;
      --accent2: #ff6a8a;
      --accent3: #6affd4;
      --glow: rgba(124,106,255,0.18);
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.13;
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 12s ease-in-out infinite alternate;
    }
    .blob1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
    .blob2 { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
    .blob3 { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 50%; animation-delay: -8s; }
    @keyframes blobFloat { from { transform: scale(1) translate(0,0); } to { transform: scale(1.12) translate(30px, 20px); } }

    .container { position: relative; z-index: 1; width: 100%; max-width: 780px; }

    /* Header */
    header { text-align: center; margin-bottom: 48px; }
    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 5px 16px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(124,106,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      background: #0e0e16;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      padding: 18px;
      resize: vertical;
      min-height: 130px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* Presets */
    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .preset-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Analyze button */
    .analyze-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 18px;
      cursor: pointer;
      margin-top: 18px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .analyze-btn:hover { background: #6a58ee; box-shadow: 0 0 30px var(--glow); }
    .analyze-btn:active { transform: scale(0.99); }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results-card { display: none; }
    .results-card.visible { display: block; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }

    .primary-emotion {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .emoji-bubble {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #1a1a26;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(124,106,255,0.2)} 50%{box-shadow:0 0 0 14px rgba(124,106,255,0)} }
    .emotion-name { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    .confidence-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .conf-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .conf-bar { height: 100%; border-radius: 4px; background: var(--accent); transition: width 1s cubic-bezier(.4,0,.2,1); }
    .conf-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

    /* All emotions grid */
    .emotions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .emotion-row { display: flex; align-items: center; gap: 10px; }
    .emo-emoji { font-size: 18px; width: 28px; text-align: center; }
    .emo-label { font-size: 12px; color: var(--muted); width: 80px; text-transform: capitalize; font-family: 'DM Mono', monospace; }
    .emo-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .emo-bar { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(.4,0,.2,1); }
    .emo-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 30px; text-align: right; }

    /* Insight box */
    .insight {
      margin-top: 24px;
      background: #0e0e16;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .insight strong { color: var(--text); }

    /* Sentiment indicator */
    .sentiment-strip {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .sent-chip {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid;
    }
    .sent-positive { border-color: var(--accent3); color: var(--accent3); background: rgba(106,255,212,0.06); }
    .sent-negative { border-color: var(--accent2); color: var(--accent2); background: rgba(255,106,138,0.06); }
    .sent-neutral  { border-color: var(--muted); color: var(--muted); background: rgba(107,107,136,0.06); }
    .sent-mixed    { border-color: #ffbe6a; color: #ffbe6a; background: rgba(255,190,106,0.06); }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 48px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    footer span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="container">
    <header>
      <div class="badge">AI · NLP · Emotion Analysis</div>
      <h1>Emo<span>Sense</span></h1>
      <p class="subtitle">// detect emotional signals in any text — powered by Claude AI</p>
    </header>

    <!-- Input card -->
    <div class="card">
      <div class="label">// input text</div>
      <textarea id="inputText" placeholder="Type or paste any text here — a message, review, journal entry, tweet..."></textarea>
      <div class="presets">
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);align-self:center;">Try:</span>
        <button class="preset-btn" onclick="fillPreset(0)">😤 Frustration</button>
        <button class="preset-btn" onclick="fillPreset(1)">🥰 Joy</button>
        <button class="preset-btn" onclick="fillPreset(2)">😰 Anxiety</button>
        <button class="preset-btn" onclick="fillPreset(3)">😢 Sadness</button>
        <button class="preset-btn" onclick="fillPreset(4)">🌀 Mixed</button>
      </div>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyze Emotions</button>
    </div>

    <!-- Results card -->
    <div class="card results-card" id="resultsCard">
      <div class="label">// analysis results</div>

      <div class="sentiment-strip" id="sentimentStrip"></div>

      <div class="primary-emotion">
        <div class="emoji-bubble" id="primaryEmoji">😐</div>
        <div>
          <div class="emotion-name" id="primaryName">Neutral</div>
          <div class="confidence-row">
            <div class="conf-bar-wrap"><div class="conf-bar" id="confBar" style="width:0%"></div></div>
            <div class="conf-pct" id="confPct">0%</div>
          </div>
        </div>
      </div>

      <div class="label">// emotion breakdown</div>
      <div class="emotions-grid" id="emotionsGrid"></div>

      <div class="insight" id="insightBox"></div>
    </div>

    <footer>Built with <span>Claude AI</span> · EmoSense Emotion Detector · 2025</footer>
  </div>

  <script>
    const PRESETS = [
      "I've been trying to fix this bug for three hours and nothing works. My deadline is tomorrow and I feel completely stuck. This is so frustrating!",
      "I just got the best news of my life! I got accepted into my dream university and I can't stop smiling. I feel like I'm floating on air!",
      "I have a big presentation tomorrow and I keep thinking about everything that could go wrong. My heart is racing and I can't sleep.",
      "It's been a rough week. I miss my old friends, everything feels dull and empty. I don't know when things will feel normal again.",
      "I'm excited for the trip but also kind of nervous about traveling alone. Part of me feels free, another part just wants to stay home."
    ];

    const EMOTION_META = {
      joy:        { emoji: '😊', color: '#ffd166' },
      sadness:    { emoji: '😢', color: '#6a8fff' },
      anger:      { emoji: '😠', color: '#ff6a6a' },
      fear:       { emoji: '😰', color: '#c77dff' },
      disgust:    { emoji: '🤢', color: '#80b918' },
      surprise:   { emoji: '😮', color: '#ff9f1c' },
      anticipation:{ emoji: '🤩', color: '#06d6a0' },
      trust:      { emoji: '🤝', color: '#48cae4' },
      frustration:{ emoji: '😤', color: '#ff6b6b' },
      love:       { emoji: '🥰', color: '#ff85a1' },
      anxiety:    { emoji: '😬', color: '#bd88f5' },
      neutral:    { emoji: '😐', color: '#6b6b88' },
      nostalgia:  { emoji: '🌅', color: '#f4a261' },
      pride:      { emoji: '💪', color: '#f9c74f' },
      relief:     { emoji: '😮‍💨', color: '#90e0ef' },
      envy:       { emoji: '😒', color: '#70e000' },
      hope:       { emoji: '🌟', color: '#ffe66d' },
      loneliness: { emoji: '🌧️', color: '#74b3ce' },
    };

    function fillPreset(i) {
      document.getElementById('inputText').value = PRESETS[i];
    }

    async function analyze() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) { alert('Please enter some text to analyze.'); return; }

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analyzing...';

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: `You are an expert emotion analysis AI. Analyze the emotional content of text and return ONLY a JSON object with no extra text, markdown, or backticks.

Return this exact structure:
{
  "primary_emotion": "emotion name (lowercase)",
  "confidence": 0.0-1.0,
  "sentiment": "positive" | "negative" | "neutral" | "mixed",
  "emotions": {
    "emotion1": 0.0-1.0,
    "emotion2": 0.0-1.0
    ... (list 6-8 relevant emotions with scores)
  },
  "insight": "A single thoughtful sentence describing the emotional pattern detected."
}

Use emotion names from: joy, sadness, anger, fear, disgust, surprise, anticipation, trust, frustration, love, anxiety, neutral, nostalgia, pride, relief, envy, hope, loneliness.
Scores should reflect relative intensity. Only include emotions present in the text.`,
            messages: [{ role: "user", content: `Analyze emotions in this text:\n\n"${text}"` }]
          })
        });

        const data = await response.json();
        const raw = data.content.map(b => b.text || '').join('');
        const clean = raw.replace(/```json|```/g, '').trim();
        const result = JSON.parse(clean);
        renderResults(result);
      } catch (e) {
        alert('Analysis failed. Please try again.');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Analyze Emotions';
      }
    }

    function renderResults(r) {
      const card = document.getElementById('resultsCard');
      card.classList.remove('visible');
      void card.offsetWidth; // force reflow
      card.classList.add('visible');

      // Primary emotion
      const meta = EMOTION_META[r.primary_emotion] || { emoji: '🧠', color: '#7c6aff' };
      document.getElementById('primaryEmoji').textContent = meta.emoji;
      document.getElementById('primaryName').textContent = capitalize(r.primary_emotion);
      const pct = Math.round(r.confidence * 100);
      document.getElementById('confPct').textContent = pct + '%';
      setTimeout(() => { document.getElementById('confBar').style.width = pct + '%'; }, 100);

      // Sentiment chip
      const sc = { positive: 'sent-positive', negative: 'sent-negative', neutral: 'sent-neutral', mixed: 'sent-mixed' };
      const sl = { positive: '↑ Positive', negative: '↓ Negative', neutral: '→ Neutral', mixed: '↕ Mixed' };
      document.getElementById('sentimentStrip').innerHTML =
        `<span class="sent-chip ${sc[r.sentiment] || 'sent-neutral'}">${sl[r.sentiment] || r.sentiment}</span>
         <span class="sent-chip sent-neutral" style="border-color:${meta.color};color:${meta.color};background:${meta.color}18;">${meta.emoji} ${capitalize(r.primary_emotion)}</span>`;

      // Emotion breakdown grid
      const sorted = Object.entries(r.emotions).sort((a,b)=>b[1]-a[1]);
      const grid = document.getElementById('emotionsGrid');
      grid.innerHTML = sorted.map(([emo, score]) => {
        const m = EMOTION_META[emo] || { emoji: '💡', color: '#7c6aff' };
        const p = Math.round(score * 100);
        return `<div class="emotion-row">
          <span class="emo-emoji">${m.emoji}</span>
          <span class="emo-label">${emo}</span>
          <div class="emo-bar-wrap"><div class="emo-bar" data-w="${p}" style="width:0%;background:${m.color}"></div></div>
          <span class="emo-pct">${p}%</span>
        </div>`;
      }).join('');

      setTimeout(() => {
        grid.querySelectorAll('.emo-bar').forEach(b => { b.style.width = b.dataset.w + '%'; });
      }, 100);

      // Insight
      document.getElementById('insightBox').innerHTML = `<strong>💡 Insight:</strong> ${r.insight}`;
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
  </script>
</body>
</html>
